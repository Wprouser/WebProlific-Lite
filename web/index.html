<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#5b3df0" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0b0b10" media="(prefers-color-scheme: dark)" />
    <title>WebProlific</title>
    <script>
      // Set the theme class before React mounts, to avoid a flash of the
      // wrong theme — mirrors ThemeProvider's own resolution logic.
      (function () {
        var stored = localStorage.getItem('webprolific-theme');
        var resolved =
          stored === 'light' || stored === 'dark'
            ? stored
            : window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light';
        if (resolved === 'dark') document.documentElement.classList.add('dark');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
